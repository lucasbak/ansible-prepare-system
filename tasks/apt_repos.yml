
## Copy Repo files
- name: Import Clemlab Jenkins publishing key
  apt_key:
    url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x449E83E81403D1C5
    state: present
  register: clemlab_jenkins_key_result
  retries: 10
  delay: 5
  until: clemlab_jenkins_key_result is succeeded

- name: Import Clemlab Jenkins publishing key
  apt_key:
    url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3E00E57AD4D182C0
    state: present
  register: clemlab_jenkins_key_result_256
  retries: 10
  delay: 5
  until: clemlab_jenkins_key_result_256 is succeeded

- name: Copy Repo
  copy:
    src: "{{ item }}"
    dest: /etc/apt/sources.list.d/
  when: offline_apt_repos is defined and offline_apt_repos
  with_fileglob:
    - "{{source_repo_folder}}/*.list"



- name: Required packages (apt)
  package: name={{item}} state=present use=apt
  with_items:
    - vim-common
    - tree
    - git
    - nano
    - vim
    - unzip
    - net-tools
    - wget

- name: update apt cache
  shell: 'apt update -y'
